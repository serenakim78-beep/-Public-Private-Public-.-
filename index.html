<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기저귀 사용 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB;
    --primary-light: #EFF6FF;
    --primary-dark: #1D4ED8;
    --accent: #10B981;
    --accent-light: #ECFDF5;
    --danger: #EF4444;
    --warning: #F59E0B;
    --surface: #FFFFFF;
    --surface2: #F8FAFC;
    --border: #E2E8F0;
    --text: #0F172A;
    --text2: #64748B;
    --text3: #94A3B8;
    --shadow: 0 4px 24px rgba(37,99,235,0.10);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #EFF6FF;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* APP SHELL */
  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--primary);
    color: white;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(37,99,235,0.25);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header-sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 2px;
  }
  .header-btn {
    background: rgba(255,255,255,0.18);
    border: none;
    color: white;
    border-radius: 8px;
    padding: 8px 13px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.18s;
  }
  .header-btn:active { background: rgba(255,255,255,0.3); }

  /* STEP PROGRESS */
  .step-progress {
    background: var(--primary);
    padding: 0 20px 14px;
  }
  .progress-track {
    background: rgba(255,255,255,0.25);
    border-radius: 100px;
    height: 4px;
    width: 100%;
    overflow: hidden;
  }
  .progress-fill {
    background: white;
    height: 100%;
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .step-label {
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    margin-top: 6px;
    font-weight: 500;
  }

  /* SCREENS */
  .screen {
    display: none;
    flex-direction: column;
    flex: 1;
    padding: 24px 20px 100px;
    animation: slideUp 0.32s cubic-bezier(0.4,0,0.2,1);
  }
  .screen.active { display: flex; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .screen-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .screen-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* OPTION CARDS */
  .option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 8px;
  }
  .option-grid.single { grid-template-columns: 1fr; }
  .option-card {
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }
  .option-card:active { transform: scale(0.97); }
  .option-card.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }
  .option-card .card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .option-card .card-desc {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
    line-height: 1.4;
  }
  .option-card.selected .card-name { color: var(--primary); }
  .check-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 18px;
    height: 18px;
    background: var(--primary);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .option-card.selected .check-badge { display: flex; }
  .check-badge svg { width: 10px; height: 10px; }

  /* TEXT INPUT */
  .input-wrap { margin-bottom: 16px; }
  .input-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; display: block; }
  .text-input {
    width: 100%; border: 2px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px 16px; font-size: 15px; font-family: 'Noto Sans KR', sans-serif; color: var(--text);
    background: var(--surface2); outline: none; transition: border-color 0.18s, box-shadow 0.18s;
  }
  .text-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }

  /* QUANTITY PICKER */
  .qty-wrap { display: flex; align-items: center; gap: 0; border: 2px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface2); }
  .qty-btn { width: 56px; height: 60px; border: none; background: transparent; font-size: 24px; font-weight: 300; color: var(--primary); cursor: pointer; }
  .qty-display { flex: 1; text-align: center; font-size: 28px; font-weight: 700; color: var(--text); border: none; background: transparent; outline: none; }
  .qty-presets { display: flex; gap: 8px; margin-top: 10px; }
  .qty-preset { flex: 1; border: 2px solid var(--border); border-radius: 8px; padding: 8px; text-align: center; font-size: 14px; font-weight: 600; color: var(--text2); background: var(--surface2); cursor: pointer; }

  /* DATETIME DISPLAY */
  .datetime-card { background: var(--primary); border-radius: var(--radius); padding: 20px; color: white; margin-bottom: 20px; }
  .dt-date { font-size: 15px; opacity: 0.85; font-weight: 500; margin-bottom: 4px; }
  .dt-time { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
  .dt-edit { margin-top: 12px; display: flex; gap: 8px; }
  .dt-edit input { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; color: white; padding: 14px 12px; font-size: 15px; outline: none; flex: 1; }
  .dt-edit input::-webkit-calendar-picker-indicator { filter: invert(1); }

  /* INFO CARD */
  .info-card { background: var(--surface2); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .info-row:last-child { border-bottom: none; }
  .info-key { font-size: 13px; color: var(--text2); font-weight: 500; }
  .info-val { font-size: 13px; color: var(--text); font-weight: 600; }

  /* BOTTOM BUTTONS */
  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 12px 20px 24px; background: white; border-top: 1px solid var(--border); display: flex; gap: 10px; z-index: 200; }
  .btn-back { border: 2px solid var(--border); background: white; border-radius: var(--radius-sm); padding: 14px 20px; font-size: 15px; font-weight: 600; color: var(--text2); cursor: pointer; }
  .btn-next { flex: 1; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 14px rgba(37,99,235,0.28); }
  .btn-next:disabled { background: var(--border); color: var(--text3); box-shadow: none; cursor: not-allowed; }

  /* SUCCESS */
  .success-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 40px 20px; }
  .success-icon { width: 80px; height: 80px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .success-icon svg { color: var(--accent); }
  .success-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text2); line-height: 1.7; }
  .success-summary { background: var(--surface2); border-radius: var(--radius); padding: 16px 20px; margin: 20px 0; text-align: left; width: 100%; }
  .success-actions { display: flex; gap: 10px; width: 100%; margin-top: 8px; }
  .btn-primary-solid { flex: 1; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-title">기저귀 사용 관리</div>
        <div class="header-sub">요양병원 스마트 기록 시스템</div>
      </div>
    </div>
  </div>

  <div class="step-progress" id="stepProgress">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:14%"></div>
    </div>
    <div class="step-label" id="stepLabel">1단계 / 7단계</div>
  </div>

  <div class="screen active" id="screen1">
    <div class="screen-title">사용 환자</div>
    <div class="screen-sub">환자의 정보를 모두 입력해 주세요.</div>
    <div class="input-wrap">
      <span class="input-label">환자 이름</span>
      <input type="text" class="text-input" id="patientName" placeholder="홍길동" oninput="filterKorean(this); validateScreen1();" style="font-size:20px;font-weight:700;">
    </div>
    <div class="input-wrap">
      <span class="input-label">환자 번호</span>
      <input type="text" class="text-input" id="patientId" placeholder="예: 12345" oninput="filterNumber(this); validateScreen1();">
    </div>
    <div class="input-wrap">
      <span class="input-label">병실</span>
      <input type="text" class="text-input" id="roomNo" placeholder="예: 301" oninput="filterNumber(this); validateScreen1();">
    </div>
  </div>

  <div class="screen" id="screen2">
    <div class="screen-title">기저귀 구분</div>
    <div class="screen-sub">사용한 기저귀 종류를 선택해 주세요.</div>
    <div class="option-grid single">
      <div class="option-card" onclick="selectDiaperCat(this,'팬티형기저귀')">
        <div class="card-name">팬티형 기저귀</div>
      </div>
      <div class="option-card" onclick="selectDiaperCat(this,'겉기저귀')">
        <div class="card-name">겉 기저귀</div>
      </div>
      <div class="option-card" onclick="selectDiaperCat(this,'속기저귀')">
        <div class="card-name">속 기저귀</div>
      </div>
      <div class="option-card" onclick="selectDiaperCat(this,'위생깔개매트')">
        <div class="card-name">위생 깔개 매트</div>
      </div>
    </div>
  </div>

  <div class="screen" id="screen3">
    <div class="screen-title">기저귀 종류</div>
    <div class="screen-sub">세부 종류를 선택해 주세요.</div>
    <div class="option-grid single" id="diaperTypeGrid"></div>
  </div>

  <div class="screen" id="screen4">
    <div class="screen-title">사용 갯수</div>
    <div class="screen-sub">사용한 수량을 입력해 주세요.</div>
    <div class="qty-wrap">
      <button class="qty-btn" onclick="changeQty(-1)">-</button>
      <input type="number" class="qty-display" id="qtyDisplay" value="1" min="1">
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <div class="info-card" style="margin-top:24px;">
      <div class="info-row"><span class="info-key">환자 이름</span><span class="info-val" id="rev-patient">-</span></div>
      <div class="info-row"><span class="info-key">기저귀 종류</span><span class="info-val" id="rev-diaper">-</span></div>
    </div>
  </div>

  <div class="screen" id="screen5">
    <div class="screen-title">날짜 및 시간</div>
    <div class="datetime-card">
      <div class="dt-date" id="dtDateDisp"></div>
      <div class="dt-time" id="dtTimeDisp"></div>
      <div class="dt-edit">
        <input type="date" id="dtDate">
        <input type="time" id="dtTime">
      </div>
    </div>
  </div>

  <div class="screen" id="screen6">
    <div class="screen-title">사용 부서 선택</div>
    <div class="option-grid">
      <div class="option-card" onclick="selectOption('dept','2A병동', this)">2A병동</div>
      <div class="option-card" onclick="selectOption('dept','2B병동', this)">2B병동</div>
      <div class="option-card" onclick="selectOption('dept','3A병동', this)">3A병동</div>
      <div class="option-card" onclick="selectOption('dept','3B병동', this)">3B병동</div>
      <div class="option-card" onclick="selectOption('dept','5병동', this)">5병동</div>
    </div>
  </div>

  <div class="screen" id="screen7">
    <div class="screen-title">입력 직원 정보</div>
    <div class="option-grid single" style="margin-bottom: 15px;">
      <div class="option-card" onclick="selectOption('staffType','간호사', this)">간호사/직원</div>
      <div class="option-card" onclick="selectOption('staffType','간병사', this)">간병사</div>
    </div>
    <div class="input-wrap">
      <span class="input-label">직원 이름</span>
      <input type="text" class="text-input" id="staffName" placeholder="이름을 입력하세요" oninput="filterKorean(this); validateScreen7();">
    </div>
  </div>

  <div class="screen" id="screen8">
    <div class="success-wrap">
      <div class="success-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <polyline points="8,20 16,28 32,12" stroke="#10B981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="success-title" id="saveStatusTitle">엑셀 저장 중...</div>
      <div class="success-sub" id="saveStatusSub">잠시만 기다려주세요.</div>
      <div class="success-actions" id="successActions" style="display:none;">
        <button class="btn-primary-solid" onclick="resetForm()">새로 입력하기</button>
      </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <button class="btn-back" id="btnBack" onclick="goBack()">이전</button>
    <button class="btn-next" id="btnNext" onclick="goNext()">다음</button>
  </div>

</div>

<script>
// ⭐ [가장 중요]여기에 1단계에서 딴 구글 주소를 꼭 붙여넣으세요!
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwNjY1dGgkZfIYs90SrejzIhyGRKp_p0E6UUch9_kri0WIl_8UtNW1NwrLNAnrXkbN/exec";

const state = {
  currentScreen: 1,
  totalScreens: 7,
  data: { date: '', time: '', dept: '', staffType: '', staffName: '', patientName: '', patientId: '', roomNo: '', diaperCat: '', diaperType: '', qty: 1 }
};

const diaperTypes = {
  '팬티형기저귀': [{name:'서림 중형'}, {name:'서림 대형'}, {name:'서림 특대'}, {name:'테나 중형'}, {name:'라이프리 중형'}, {name:'디펜드 중형'}, {name:'자가'}],
  '겉기저귀': [{name:'포인트 대형'}, {name:'이지스 중형'}, {name:'자가'}],
  '속기저귀': [{name:'포인트 일자형'}, {name:'자가'}],
  '위생깔개매트': [{name:'포인트 깔개매트'}, {name:'자가'}]
};

function filterKorean(el) { el.value = el.value.replace(/[^ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/g, ''); }
function filterNumber(el) { el.value = el.value.replace(/[^0-9]/g, ''); }

function init() {
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  state.data.date = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  state.data.time = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('dtDate').value = state.data.date;
  document.getElementById('dtTime').value = state.data.time;
  updateDateDisplay();
  validateCurrentScreen();
}

function updateDateDisplay() {
  document.getElementById('dtDateDisp').textContent = state.data.date;
  document.getElementById('dtTimeDisp').textContent = state.data.time;
}

document.getElementById('dtDate').addEventListener('input', function() { state.data.date = this.value; updateDateDisplay(); });
document.getElementById('dtTime').addEventListener('input', function() { state.data.time = this.value; updateDateDisplay(); });

function goTo(screenNum) {
  for (let i = 1; i <= 8; i++) document.getElementById('screen' + i).classList.remove('active');
  document.getElementById('screen' + screenNum).classList.add('active');
  state.currentScreen = screenNum;
  
  const sp = document.getElementById('stepProgress');
  const bb = document.getElementById('bottomBar');
  
  if (screenNum === 8) {
    sp.style.display = 'none';
    bb.style.display = 'none';
    saveDataToGoogle(); // 8단계 도달 시 구글 엑셀로 전송 시작
  } else {
    sp.style.display = '';
    bb.style.display = '';
    document.getElementById('progressFill').style.width = Math.round((screenNum / state.totalScreens) * 100) + '%';
    document.getElementById('stepLabel').textContent = screenNum + "단계 / 7단계";
  }
  validateCurrentScreen();
}

function goNext() { if(state.currentScreen < 8) goTo(state.currentScreen + 1); }
function goBack() { if(state.currentScreen > 1) goTo(state.currentScreen - 1); }

function validateCurrentScreen() {
  let isValid = false;
  if (state.currentScreen === 1) {
    isValid = document.getElementById('patientName').value && document.getElementById('patientId').value && document.getElementById('roomNo').value;
  } else if (state.currentScreen === 2) {
    isValid = state.data.diaperCat;
  } else if (state.currentScreen === 3) {
    isValid = state.data.diaperType;
  } else if (state.currentScreen === 4) {
    state.data.qty = document.getElementById('qtyDisplay').value;
    document.getElementById('rev-patient').textContent = document.getElementById('patientName').value;
    document.getElementById('rev-diaper').textContent = state.data.diaperType;
    isValid = true;
  } else if (state.currentScreen === 5 || state.currentScreen === 6) {
    isValid = true;
  } else if (state.currentScreen === 7) {
    isValid = state.data.staffType && document.getElementById('staffName').value;
    state.data.staffName = document.getElementById('staffName').value;
  }
  document.getElementById('btnNext').disabled = !isValid;
}

function validateScreen1() { validateCurrentScreen(); }
function validateScreen7() { validateCurrentScreen(); }

function selectDiaperCat(el, cat) {
  state.data.diaperCat = cat;
  state.data.diaperType = '';
  const cards = el.parentElement.querySelectorAll('.option-card');
  cards.forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  
  const grid = document.getElementById('diaperTypeGrid');
  grid.innerHTML = '';
  diaperTypes[cat].forEach(t => {
    const div = document.createElement('div');
    div.className = 'option-card';
    div.textContent = t.name;
    div.onclick = function() {
      state.data.diaperType = t.name;
      grid.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
      div.classList.add('selected');
      validateCurrentScreen();
    };
    grid.appendChild(div);
  });
  validateCurrentScreen();
}

function selectOption(field, val, el) {
  state.data[field] = val;
  const cards = el.parentElement.querySelectorAll('.option-card');
  cards.forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  validateCurrentScreen();
}

function changeQty(n) {
  const disp = document.getElementById('qtyDisplay');
  let val = parseInt(disp.value) + n;
  if(val < 1) val = 1;
  disp.value = val;
  validateCurrentScreen();
}

// 🚀 구글 엑셀 파일로 실시간 데이터를 전송하는 무선 통신 함수
function saveDataToGoogle() {
  state.data.patientName = document.getElementById('patientName').value;
  state.data.patientId = document.getElementById('patientId').value;
  state.data.roomNo = document.getElementById('roomNo').value;

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors", // 보안 정책 우회 설정
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(state.data)
  })
  .then(() => {
    document.getElementById('saveStatusTitle').textContent = "저장 완료!";
    document.getElementById('saveStatusSub').textContent = "구글 스프레드시트에 성공적으로 기록되었습니다.";
    document.getElementById('successActions').style.display = 'flex';
  })
  .catch(err => {
    document.getElementById('saveStatusTitle').textContent = "등록 대기";
    document.getElementById('saveStatusSub').textContent = "전송에 지연이 있거나 주소 설정이 필요합니다.";
    document.getElementById('successActions').style.display = 'flex';
  });
}

function resetForm() {
  document.getElementById('patientName').value = '';
  document.getElementById('patientId').value = '';
  document.getElementById('roomNo').value = '';
  document.getElementById('staffName').value = '';
  document.getElementById('qtyDisplay').value = 1;
  state.data = { date: '', time: '', dept: '', staffType: '', staffName: '', patientName: '', patientId: '', roomNo: '', diaperCat: '', diaperType: '', qty: 1 };
  
  document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  init();
  goTo(1);
}

window.onload = init;
</script>
