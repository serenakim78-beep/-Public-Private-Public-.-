<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기저귀 사용 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB; --primary-light: #EFF6FF; --primary-dark: #1D4ED8;
    --accent: #10B981; --accent-light: #ECFDF5; --danger: #EF4444; --warning: #F59E0B;
    --surface: #FFFFFF; --surface2: #F8FAFC; --border: #E2E8F0;
    --text: #0F172A; --text2: #64748B; --text3: #94A3B8;
    --shadow: 0 4px 24px rgba(37,99,235,0.10); --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #EFF6FF; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  #app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--surface); display: flex; flex-direction: column; position: relative; overflow: hidden; }
  
  /* 커스텀 모달 스타일 */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-content { background: white; padding: 24px; border-radius: 16px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
  .modal-title { font-weight: 700; font-size: 18px; margin-bottom: 12px; color: var(--text); }
  .modal-body { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; white-space: pre-wrap; text-align: left; max-height: 300px; overflow-y: auto; }
  .modal-btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; }

  .header { background: var(--primary); color: white; padding: 18px 20px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(37,99,235,0.25); }
  .header-row { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-tabs { display: flex; gap: 4px; margin-top: 4px; }
  .nav-tab-btn { flex: 1; background: rgba(255, 255, 255, 0.15); border: none; color: rgba(255, 255, 255, 0.7); padding: 10px; font-size: 14px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif; border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.2s; text-align: center; }
  .nav-tab-btn.active { background: var(--surface); color: var(--primary); }
  .step-progress { background: var(--surface2); padding: 12px 20px; border-bottom: 1px solid var(--border); }
  .progress-track { background: var(--border); border-radius: 100px; height: 4px; width: 100%; overflow: hidden; }
  .progress-fill { background: var(--primary); height: 100%; border-radius: 100px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  .step-label { color: var(--text2); font-size: 11px; margin-top: 6px; font-weight: 600; }
  .screen { display: none; flex-direction: column; flex: 1; padding: 24px 20px 100px; animation: slideUp 0.32s cubic-bezier(0.4,0,0.2,1); }
  .screen.active { display: flex; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  .screen-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
  .screen-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
  .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .option-grid.single { grid-template-columns: 1fr; }
  .option-card { border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.18s; background: var(--surface2); }
  .option-card:active { transform: scale(0.97); }
  .option-card.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .option-card.selected .card-name { color: var(--primary); }
  .input-wrap { margin-bottom: 16px; }
  .input-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; display: block; }
  .text-input { width: 100%; border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 15px; background: var(--surface2); outline: none; }
  .text-input:focus { border-color: var(--primary); background: white; }
  .qty-wrap { display: flex; align-items: center; gap: 0; border: 2px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface2); }
  .qty-btn { width: 56px; height: 60px; border: none; background: transparent; font-size: 24px; color: var(--primary); cursor: pointer; }
  .qty-display { flex: 1; text-align: center; font-size: 28px; font-weight: 700; color: var(--text); border: none; background: transparent; outline: none; }
  .qty-presets-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 14px; }
  .qty-preset-btn { border: 2px solid var(--border); border-radius: 8px; padding: 12px 0; font-size: 15px; font-weight: 700; color: var(--text2); background: var(--surface2); cursor: pointer; }
  .qty-preset-btn.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
  .datetime-card { background: var(--primary); border-radius: var(--radius); padding: 20px; color: white; margin-bottom: 20px; }
  .dt-time { font-size: 38px; font-weight: 700; letter-spacing: -1px; }
  .dt-edit { margin-top: 12px; display: flex; gap: 8px; }
  .dt-edit input { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; color: white; padding: 14px 12px; flex: 1; }
  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; padding: 12px 20px 24px; background: white; border-top: 1px solid var(--border); display: flex; gap: 10px; z-index: 200; }
  .btn-back { border: 2px solid var(--border); background: white; border-radius: var(--radius-sm); padding: 14px 20px; font-size: 15px; color: var(--text2); cursor: pointer; }
  .btn-next { flex: 1; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .btn-next:disabled { background: var(--border); color: var(--text3); }
  .success-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 40px 20px; }
  .success-icon { width: 80px; height: 80px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .btn-primary-solid { flex: 1; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .stats-filter-card { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .stats-data-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 16px; border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; }
</style>
</head>
<body>

<div id="app">
  <div id="custom-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">알림</div>
      <div class="modal-body" id="modalBody">내용</div>
      <button class="modal-btn" onclick="closeModal()">확인</button>
    </div>
  </div>

  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-title">기저귀 사용 관리</div>
        <div class="header-sub">요양병원 스마트 기록 시스템</div>
      </div>
    </div>
    <div class="header-tabs">
      <button class="nav-tab-btn active" id="tab-record" onclick="switchMainTab('record')">기저귀 기록</button>
      <button class="nav-tab-btn" id="tab-stats" onclick="switchMainTab('stats')">통계 확인</button>
    </div>
  </div>

  <div id="main-stats-area" style="display: none; flex-direction: column; flex: 1; padding: 24px 20px 100px; overflow-y: auto;">
    <div class="stats-filter-card">
      <input type="date" id="statsStartDate" style="width:100%; margin-bottom:10px; padding:10px;">
      <input type="date" id="statsEndDate" style="width:100%; margin-bottom:10px; padding:10px;">
      <button class="btn-next" onclick="loadStatistics()" style="width:100%">조회하기</button>
    </div>
    <div id="stats-result-container" style="display:none;"></div>
    <div id="stats-loading-msg" style="display:none;">데이터 불러오는 중...</div>
    <div id="stats-initial-msg">날짜를 설정하고 조회하세요.</div>
  </div>

  <div id="main-record-area" style="display: flex; flex-direction: column; flex: 1;">
    <div class="step-progress" id="stepProgress">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:14%"></div></div>
      <div class="step-label" id="stepLabel">1단계 / 7단계</div>
    </div>
    <div class="screen active" id="screen1">
      <div class="screen-title">사용 환자</div>
      <input type="text" class="text-input" id="patientName" placeholder="환자 이름" oninput="validateCurrentScreen()">
      <input type="text" class="text-input" id="patientId" placeholder="환자 번호" oninput="validateCurrentScreen()">
      <input type="text" class="text-input" id="roomNo" placeholder="병실" oninput="validateCurrentScreen()">
    </div>
    <div class="screen" id="screen2">
      <div class="screen-title">기저귀 구분</div>
      <div class="option-grid single" id="catGrid">
        <div class="option-card" onclick="selectDiaperCat(this,'팬티형기저귀')">팬티형 기저귀</div>
        <div class="option-card" onclick="selectDiaperCat(this,'겉기저귀')">겉 기저귀</div>
        <div class="option-card" onclick="selectDiaperCat(this,'속기저귀')">속 기저귀</div>
        <div class="option-card" onclick="selectDiaperCat(this,'위생깔개매트')">위생 깔개 매트</div>
      </div>
    </div>
    <div class="screen" id="screen3">
      <div class="screen-title">기저귀 종류</div>
      <div class="option-grid single" id="diaperTypeGrid"></div>
    </div>
    <div class="screen" id="screen4">
      <div class="screen-title">사용 갯수</div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty(-1)">-</button>
        <input type="number" class="qty-display" id="qtyDisplay" value="1" min="1" oninput="validateCurrentScreen()">
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>
    <div class="screen" id="screen5">
      <div class="screen-title">날짜 및 시간</div>
      <div class="datetime-card">
        <input type="date" id="dtDate" style="width:100%; margin-bottom:10px;">
        <input type="time" id="dtTime" style="width:100%;">
      </div>
    </div>
    <div class="screen" id="screen6">
      <div class="screen-title">사용 부서</div>
      <div class="option-grid" id="deptGrid">
        <div class="option-card" onclick="selectOption('dept','2A병동', this)">2A병동</div>
        <div class="option-card" onclick="selectOption('dept','2B병동', this)">2B병동</div>
        <div class="option-card" onclick="selectOption('dept','3A병동', this)">3A병동</div>
        <div class="option-card" onclick="selectOption('dept','3B병동', this)">3B병동</div>
        <div class="option-card" onclick="selectOption('dept','5병동', this)">5병동</div>
      </div>
    </div>
    <div class="screen" id="screen7">
      <div class="screen-title">직원 정보</div>
      <div class="option-grid single">
        <div class="option-card" onclick="selectOption('staffType','간호사', this)">간호사</div>
        <div class="option-card" onclick="selectOption('staffType','간병사', this)">간병사</div>
      </div>
      <input type="text" class="text-input" id="staffName" placeholder="직원 이름" oninput="validateCurrentScreen()">
    </div>
    <div class="screen" id="screen8">
      <div class="success-wrap">
        <div class="success-title" id="saveStatusTitle">저장 완료</div>
        <button class="btn-primary-solid" onclick="resetForm()">새로 입력하기</button>
      </div>
    </div>
    <div class="bottom-bar" id="bottomBar">
      <button class="btn-back" onclick="goBack()">이전</button>
      <button class="btn-next" id="btnNext" onclick="goNext()">다음</button>
    </div>
  </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuo-UYQr3NmHJuGY2v-w4KcOObRfv2YX9Xs6CY9CQDxqhB2cOW_MxtuFToY8fu_CEN/exec";
const state = { currentScreen: 1, totalScreens: 7, data: { dept: '', staffType: '', staffName: '', patientName: '', patientId: '', roomNo: '', diaperCat: '', diaperType: '', qty: 1 } };
const diaperTypes = { '팬티형기저귀': [{name:'서림 중형'}, {name:'서림 대형'}], '겉기저귀': [{name:'포인트 대형'}], '속기저귀': [{name:'포인트 일자형'}], '위생깔개매트': [{name:'깔개매트'}] };

function showModal(title, msg) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalBody').textContent = msg; document.getElementById('custom-modal').style.display = 'flex'; }
function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
function switchMainTab(tab) {
  const isRecord = tab === 'record';
  document.getElementById('main-record-area').style.display = isRecord ? 'flex' : 'none';
  document.getElementById('main-stats-area').style.display = isRecord ? 'none' : 'flex';
}
function goTo(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen'+n).classList.add('active');
  state.currentScreen = n;
  if(n === 8) saveDataToGoogle();
}
function goNext() { if(state.currentScreen < 8) goTo(state.currentScreen + 1); }
function goBack() { if(state.currentScreen > 1) goTo(state.currentScreen - 1); }
function selectDiaperCat(el, cat) {
  state.data.diaperCat = cat;
  document.querySelectorAll('#catGrid .option-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const grid = document.getElementById('diaperTypeGrid'); grid.innerHTML = '';
  diaperTypes[cat].forEach(t => {
    const div = document.createElement('div'); div.className = 'option-card'; div.textContent = t.name;
    div.onclick = () => { state.data.diaperType = t.name; document.querySelectorAll('#diaperTypeGrid .option-card').forEach(c => c.classList.remove('selected')); div.classList.add('selected'); validateCurrentScreen(); };
    grid.appendChild(div);
  });
  validateCurrentScreen();
}
function selectOption(f, v, el) { state.data[f] = v; el.parentElement.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected')); el.classList.add('selected'); validateCurrentScreen(); }
function changeQty(n) { const d = document.getElementById('qtyDisplay'); d.value = Math.max(1, parseInt(d.value) + n); validateCurrentScreen(); }
function validateCurrentScreen() { document.getElementById('btnNext').disabled = false; }
function saveDataToGoogle() {
  const params = new URLSearchParams(state.data);
  fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: params }).then(() => showModal("완료", "저장되었습니다."));
}
function resetForm() { location.reload(); }
function loadStatistics() { showModal("조회", "통계 기능을 불러옵니다."); }
window.onload = () => { document.getElementById('dtDate').valueAsDate = new Date(); };
</script>
</body>
</html>
