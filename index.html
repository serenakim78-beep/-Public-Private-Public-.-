<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요양병원 기저귀 사용 관리</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; background: #ecf0f1; border: 1px solid #bdc3c7; }
        .tab.active { background: #3498db; color: white; font-weight: bold; border-color: #3498db; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #27ae60; }
        .section { display: none; }
        .section.active { display: block; }
        #loading { display: none; text-align: center; color: #e74c3c; font-weight: bold; margin-top: 10px; }
        .stat-box { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-left: 4px solid #3498db; }
    </style>
</head>
<body>

<div class="container">
    <h2>기저귀 사용 관리</h2>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('input')">입력 (직원용)</div>
        <div class="tab" onclick="switchTab('admin'); loadStats();">통계 (관리자용)</div>
    </div>

    <div id="inputSection" class="section active">
        <form id="diaperForm">
            <div class="form-group"><label>사용 날짜</label><input type="date" id="date" required></div>
            <div class="form-group"><label>사용 시간</label><input type="time" id="time" required></div>
            <div class="form-group"><label>사용 부서</label><input type="text" id="department" placeholder="예: 3병동" required></div>
            <div class="form-group"><label>입력 직원 유형</label>
                <select id="staffType" required>
                    <option value="">선택하세요</option>
                    <option value="간호사">간호사</option>
                    <option value="간호조무사">간호조무사</option>
                    <option value="요양보호사">요양보호사</option>
                </select>
            </div>
            <div class="form-group"><label>입력 직원 이름</label><input type="text" id="staffName" required></div>
            <hr>
            <div class="form-group"><label>사용 환자 이름</label><input type="text" id="patientName" required></div>
            <div class="form-group"><label>사용 환자 번호 (차트번호)</label><input type="text" id="patientId" required></div>
            <div class="form-group"><label>사용 환자 병실</label><input type="text" id="room" placeholder="예: 301호" required></div>
            <hr>
            <div class="form-group"><label>기저귀 구분</label>
                <select id="category" onchange="updateTypes()" required>
                    <option value="">선택하세요</option>
                    <option value="팬티형 기저귀">팬티형 기저귀</option>
                    <option value="겉 기저귀">겉 기저귀</option>
                    <option value="속 기저귀">속 기저귀</option>
                    <option value="위생용 깔개 매트">위생용 깔개 매트</option>
                </select>
            </div>
            <div class="form-group"><label>기저귀 종류</label>
                <select id="type" required>
                    <option value="">구분을 먼저 선택하세요</option>
                </select>
            </div>
            <button type="submit">제출하기</button>
            <div id="loading">데이터를 저장 중입니다...</div>
        </form>
    </div>

<div id="adminSection" class="section">
        <p style="font-size: 12px; color: #7f8c8d; margin-bottom: 15px;">※ 최근 입력된 데이터를 기준으로 상세 통계를 제공합니다.</p>
        
        <select id="statType" onchange="renderStats(window.cachedData)" style="margin-bottom: 15px; padding: 10px; width: 100%; font-weight: bold; background-color: #e8f4f8; border: 1px solid #3498db;">
            <option value="dept">1. 부서별 통계 (부서 ➔ 환자 ➔ 기저귀)</option>
            <option value="patient">2. 환자별 통계 (환자 ➔ 기저귀)</option>
            <option value="diaper">3. 기저귀 종류별 통계 (기저귀 ➔ 환자)</option>
        </select>

        <div id="statContent">데이터를 불러오는 중입니다...</div>
    </div>
<script>
    // 구글 앱스 스크립트 웹 앱 URL을 아래에 붙여넣으세요.
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzW1kpNGWxgAdLx5ZhFKQTGXhZvGnG_Eha-xxuCdvNOdS4AvZztlRBzVZY0ANRO41-s/exec';

    // 오늘 날짜 및 시간 자동 설정
    document.getElementById('date').valueAsDate = new Date();
    document.getElementById('time').value = new Date().toTimeString().slice(0,5);

    // 기저귀 종류 데이터 매핑
    const diaperData = {
        "팬티형 기저귀": [
            "국산 서림 시그널라인 언더웨어 대형 흡수율 800 대형",
            "국산 서림 시그널라인 언더웨어 특대형 흡수율 880 특대형",
            "타이완 테나 프로스킨 언더웨어 중형 흡수율 1,000 중형",
            "태국 라이프리 안심 언더웨어 중형 흡수율 850 중형",
            "태국 라이프리 안심 언더웨어 대형 흡수율 850 중형",
            "국산 유한킴벌리 디펜드 스타일 언더웨어 중형 흡수율 400 중형",
            "중국 휴먼스토리 팬티 언더웨어 대형 흡수율 1200 대형",
            "국산 유한킴벌리 디펜드 안심 언더웨어 대형 흡수율 1200 대형"
        ],
        "겉 기저귀": ["중국 이지스 골드 성인용 기저귀 중형 흡수율 750 중형"],
        "속 기저귀": ["중국 포인트 일자형 속기저귀 보통 사이즈 보통"],
        "위생용 깔개 매트": ["중국 포인트 위생깔개 매트 대형 사이즈 대형"]
    };

    function updateTypes() {
        const category = document.getElementById("category").value;
        const typeSelect = document.getElementById("type");
        typeSelect.innerHTML = '<option value="">선택하세요</option>';
        if (diaperData[category]) {
            diaperData[category].forEach(item => {
                const option = document.createElement("option");
                option.value = item;
                option.text = item;
                typeSelect.add(option);
            });
        }
    }

    // 탭 전환 로직
    function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        
        if(tabName === 'input') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('inputSection').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('adminSection').classList.add('active');
        }
    }

    // 데이터 제출 로직
    document.getElementById('diaperForm').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('loading').style.display = 'block';

        const data = {
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            department: document.getElementById('department').value,
            staffType: document.getElementById('staffType').value,
            staffName: document.getElementById('staffName').value,
            patientName: document.getElementById('patientName').value,
            patientId: document.getElementById('patientId').value,
            room: document.getElementById('room').value,
            category: document.getElementById('category').value,
            type: document.getElementById('type').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            alert('성공적으로 저장되었습니다!');
            document.getElementById('diaperForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('time').value = new Date().toTimeString().slice(0,5);
        })
        .catch(error => {
            alert('저장 중 오류가 발생했습니다. 다시 시도해주세요.');
        })
        .finally(() => {
            document.getElementById('loading').style.display = 'none';
        });
    });

    // 통계 불러오기 (간단한 요약)
    function loadStats() {
        const statContent = document.getElementById('statContent');
        statContent.innerHTML = '데이터를 불러오는 중입니다...';

        fetch(SCRIPT_URL)
        .then(response => response.json())
        .then(data => {
            if(data.length === 0) {
                statContent.innerHTML = '입력된 데이터가 없습니다.';
                return;
            }

            // 총 사용량 요약 (기저귀 구분별)
            let categoryCount = {};
            data.forEach(row => {
                let cat = row[8]; // 기저귀 구분
                categoryCount[cat] = (categoryCount[cat] || 0) + 1;
            });

            let html = '<h3>전체 기저귀 사용 요약 (누적)</h3>';
            for (const [key, value] of Object.entries(categoryCount)) {
                html += `<div class="stat-box"><strong>${key}</strong>: ${value}개 사용</div>`;
            }
            
            html += '<br><a href="https://docs.google.com/spreadsheets" target="_blank">🔗 구글 시트에서 상세 통계(부서/환자별) 확인하기</a>';
            statContent.innerHTML = html;
        })
        .catch(err => {
            statContent.innerHTML = '통계를 불러오는데 실패했습니다.';
        });
    }
</script>

</body>
</html>
