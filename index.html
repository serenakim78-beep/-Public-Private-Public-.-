<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기저귀 사용 관리</title>
<style>
:root { --primary: #2563EB; --primary-light: #EFF6FF; --surface: #FFFFFF; --surface2: #F8FAFC; --border: #E2E8F0; --text: #0F172A; --text2: #64748B; }
body { font-family: sans-serif; background: #EFF6FF; margin: 0; display: flex; justify-content: center; }
#app { width: 100%; max-width: 480px; min-height: 100vh; background: white; }
.header { background: var(--primary); color: white; padding: 20px; }
.tabs { display: flex; gap: 5px; margin-top: 10px; }
.tab-btn { flex: 1; padding: 10px; border: none; background: rgba(255,255,255,0.2); color: white; cursor: pointer; border-radius: 5px; }
.tab-btn.active { background: white; color: var(--primary); }
.screen { display: none; padding: 20px; }
.screen.active { display: block; }
.input-group { margin-bottom: 15px; }
input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box; }
button.main-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
.stats-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div style="font-weight:bold; font-size:18px;">기저귀 사용 관리</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="showScreen('record')">기록하기</button>
      <button class="tab-btn" onclick="showScreen('stats')">통계보기</button>
    </div>
  </div>

  <div id="screen-record" class="screen active">
    <div class="input-group">환자이름: <input type="text" id="pName"></div>
    <div class="input-group">환자번호: <input type="text" id="pId"></div>
    <div class="input-group">수량: <input type="number" id="qty" value="1"></div>
    <button class="main-btn" onclick="saveData()">저장하기</button>
  </div>

  <div id="screen-stats" class="screen">
    <button class="main-btn" onclick="loadStats()">데이터 불러오기</button>
    <div id="stats-result" style="margin-top:20px;"></div>
  </div>
</div>

<script>
// 배포한 웹앱 URL을 아래에 정확히 넣으세요
const URL = "https://script.google.com/macros/s/AKfycbzuo-UYQr3NmHJuGY2v-w4KcOObRfv2YX9Xs6CY9CQDxqhB2cOW_MxtuFToY8fu_CEN/exec";

function showScreen(type) {
  document.getElementById('screen-record').className = type === 'record' ? 'screen active' : 'screen';
  document.getElementById('screen-stats').className = type === 'stats' ? 'screen active' : 'screen';
}

function saveData() {
  const data = {
    patientName: document.getElementById('pName').value,
    patientId: document.getElementById('pId').value,
    qty: document.getElementById('qty').value
  };
  const qs = new URLSearchParams(data).toString();
  fetch(URL + "?" + qs, { method: "POST" })
  .then(() => alert("저장되었습니다!"));
}

function loadStats() {
  fetch(URL)
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(row => {
      html += `<div class="stats-row"><span>${row.patientName}</span><span>${row.qty}개</span></div>`;
    });
    document.getElementById('stats-result').innerHTML = html;
  });
}
</script>
</body>
</html>
