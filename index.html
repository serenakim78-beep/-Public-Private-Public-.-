<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기저귀 사용 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB;
    --primary-light: #EFF6FF;
    --primary-dark: #1D4ED8;
    --accent: #10B981;
    --accent-light: #ECFDF5;
    --danger: #EF4444;
    --warning: #F59E0B;
    --surface: #FFFFFF;
    --surface2: #F8FAFC;
    --border: #E2E8F0;
    --text: #0F172A;
    --text2: #64748B;
    --text3: #94A3B8;
    --shadow: 0 4px 24px rgba(37,99,235,0.10);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #EFF6FF;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* APP SHELL */
  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--primary);
    color: white;
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(37,99,235,0.25);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header-sub {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 2px;
  }
  .header-btn {
    background: rgba(255,255,255,0.18);
    border: none;
    color: white;
    border-radius: 8px;
    padding: 8px 13px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.18s;
  }
  .header-btn:active { background: rgba(255,255,255,0.3); }
  .header-btn.nav-back { background: var(--accent); }
  .header-btn.nav-back:active { background: #059669; }

  /* STEP PROGRESS */
  .step-progress {
    background: var(--primary);
    padding: 0 20px 14px;
  }
  .progress-track {
    background: rgba(255,255,255,0.25);
    border-radius: 100px;
    height: 4px;
    width: 100%;
    overflow: hidden;
  }
  .progress-fill {
    background: white;
    height: 100%;
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .step-label {
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    margin-top: 6px;
    font-weight: 500;
  }

  /* SCREENS */
  .screen {
    display: none;
    flex-direction: column;
    flex: 1;
    padding: 24px 20px 100px;
    animation: slideUp 0.32s cubic-bezier(0.4,0,0.2,1);
  }
  .screen.active { display: flex; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .screen-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .screen-sub {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* OPTION CARDS */
  .option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 8px;
  }
  .option-grid.single { grid-template-columns: 1fr; }
  .option-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
  .option-card {
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }
  .option-card:active { transform: scale(0.97); }
  .option-card.selected {
    border-color: var(--primary);
    background: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }
  .option-card .card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .option-card .card-desc {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
    line-height: 1.4;
  }
  .option-card.selected .card-name { color: var(--primary); }
  .check-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 18px;
    height: 18px;
    background: var(--primary);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .option-card.selected .check-badge { display: flex; }
  .check-badge svg { width: 10px; height: 10px; }

  /* TEXT INPUT */
  .input-wrap {
    margin-bottom: 16px;
  }
  .input-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 8px;
    display: block;
  }
  .text-input {
    width: 100%;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: var(--surface2);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .text-input:focus {
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
  }
  .text-input::placeholder { color: var(--text3); }

  /* QUANTITY PICKER */
  .qty-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--surface2);
  }
  .qty-btn {
    width: 56px;
    height: 60px;
    border: none;
    background: transparent;
    font-size: 24px;
    font-weight: 300;
    color: var(--primary);
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .qty-btn:active { background: var(--primary-light); }
  .qty-display {
    flex: 1;
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    border: none;
    background: transparent;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .qty-presets {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .qty-preset {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .qty-preset:active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

  /* DATETIME DISPLAY */
  .datetime-card {
    background: var(--primary);
    border-radius: var(--radius);
    padding: 20px;
    color: white;
    margin-bottom: 20px;
  }
  .dt-date {
    font-size: 15px;
    opacity: 0.85;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .dt-time {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .dt-edit {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  .dt-edit input {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 8px;
    color: white;
    padding: 8px 10px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    flex: 1;
  }
  .dt-edit input::-webkit-calendar-picker-indicator { filter: invert(1); }

  /* INFO CARD (review) */
  .info-card {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { font-size: 13px; color: var(--text2); font-weight: 500; }
  .info-val { font-size: 13px; color: var(--text); font-weight: 600; }

  /* BOTTOM BUTTONS */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    padding: 12px 20px 24px;
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    z-index: 200;
  }
  .btn-back {
    border: 2px solid var(--border);
    background: white;
    border-radius: var(--radius-sm);
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text2);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .btn-back:active { background: var(--surface2); }
  .btn-next {
    flex: 1;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.18s;
    box-shadow: 0 4px 14px rgba(37,99,235,0.28);
    letter-spacing: -0.3px;
  }
  .btn-next:active { transform: scale(0.98); background: var(--primary-dark); }
  .btn-next:disabled { background: var(--border); color: var(--text3); box-shadow: none; cursor: not-allowed; }
  .btn-save {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.18s;
    box-shadow: 0 4px 14px rgba(16,185,129,0.28);
    letter-spacing: -0.3px;
  }
  .btn-save:active { transform: scale(0.98); }

  /* STATS SCREEN */
  .stats-tabs {
    display: flex;
    gap: 0;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .stats-tab {
    flex: 1;
    padding: 10px 6px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    background: var(--surface2);
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .stats-tab.active { background: var(--primary); color: white; }

  .stat-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 10px;
    background: white;
  }
  .stat-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .stat-card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-badge {
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 700;
  }
  .stat-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .stat-bar-label {
    font-size: 12px;
    color: var(--text2);
    width: 90px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .stat-bar-track {
    flex: 1;
    background: var(--border);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--primary);
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .stat-bar-fill.accent { background: var(--accent); }
  .stat-bar-fill.warn { background: var(--warning); }
  .stat-bar-count {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    width: 24px;
    text-align: right;
    flex-shrink: 0;
  }

  /* SUCCESS */
  .success-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px 20px;
  }
  .success-icon {
    width: 80px;
    height: 80px;
    background: var(--accent-light);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-icon svg { color: var(--accent); }
  .success-title { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text2); line-height: 1.7; }
  .success-summary {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin: 20px 0;
    text-align: left;
    width: 100%;
  }
  .success-actions {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 8px;
  }
  .btn-outline {
    flex: 1;
    border: 2px solid var(--primary);
    background: white;
    color: var(--primary);
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .btn-outline:active { background: var(--primary-light); }
  .btn-primary-solid {
    flex: 1;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }

  /* FILTER BAR */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .filter-chip {
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    background: white;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

  /* RECORD LIST */
  .record-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
    background: white;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .record-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .record-main { flex: 1; min-width: 0; }
  .record-patient {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .record-meta {
    font-size: 11px;
    color: var(--text2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .record-qty {
    font-size: 20px;
    font-weight: 800;
    color: var(--primary);
    flex-shrink: 0;
  }
  .record-qty span { font-size: 11px; font-weight: 500; color: var(--text2); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
  }
  .empty-state svg { opacity: 0.35; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .empty-desc { font-size: 13px; }

  /* WARD BADGE */
  .ward-badge {
    display: inline-block;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 4px;
  }

  /* SCROLLBAR HIDE */
  .filter-row::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-title">기저귀 사용 관리</div>
        <div class="header-sub" id="headerSub">요양병원 스마트 기록 시스템</div>
      </div>
      <button class="header-btn" id="headerActionBtn" onclick="toggleMainStats()">통계 보기</button>
    </div>
  </div>

  <div class="step-progress" id="stepProgress">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:14%"></div>
    </div>
    <div class="step-label" id="stepLabel">1단계 / 7단계</div>
  </div>

  <div class="screen active" id="screen1">
    <div class="screen-title">날짜 및 시간</div>
    <div class="screen-sub">기저귀 사용 날짜와 시간을 확인해 주세요.</div>

    <div class="datetime-card">
      <div class="dt-date" id="dtDateDisp"></div>
      <div class="dt-time" id="dtTimeDisp"></div>
      <div class="dt-edit">
        <input type="date" id="dtDate">
        <input type="time" id="dtTime">
      </div>
    </div>

    <div class="input-wrap">
      <span class="input-label">현재 시간으로 자동 설정됩니다. 수정이 필요하면 위에서 변경하세요.</span>
    </div>
  </div>

  <div class="screen" id="screen2">
    <div class="screen-title">사용 부서 선택</div>
    <div class="screen-sub">환자가 있는 병동을 선택해 주세요.</div>
    <div class="option-grid">
      <div class="option-card" onclick="selectOption(this,'dept','2A병동')">
        <div class="check-badge"><svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="card-name">2A병동</div>
      </div>
      <div class="option-card" onclick="selectOption(this,'dept','2B병동')">
        <div class="check-badge"><svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="card-name">2B병동</div>
      </div>
      <div class="option-card" onclick="selectOption(this,'dept','3A병동')">
        <div class="check-badge"><svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="card-name">3A병동</div>
      </div>
      <div class="option-card" onclick="selectOption(this,'dept','3B병동')">
        <div class="check-badge"><svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="card-name">3B병동</div>
      </div>
      <div class="option-card" onclick="selectOption(this,'dept','5병동')">
        <div class="check-badge"><svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="card-name">5병동</div>
      </div>
    </div>
  </div>

  <div class="screen" id="screen3">
    <div class="screen-title">입력 직원 유형</div>
    <div class="screen-sub">기저귀를 제공하는 직원 유형을 선택해 주세요.</div>
    <div class="option-grid single">
      <div class="option-card" onclick="selectOption(this,'staffType','행정직원')">
        <div class="check-badge"><svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="card-name">행정직원</div>
        <div class="card-desc">병동 행정 담당자</div>
      </div>
      <div class="option-card" onclick="selectOption(this,'staffType','병동직원')">
        <div class="check-badge"><svg viewBox="0 0 10 10" fill="none"><polyline points="1.
