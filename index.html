<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기저귀 사용 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2563EB; --primary-light: #EFF6FF; --primary-dark: #1D4ED8;
    --accent: #10B981; --accent-light: #ECFDF5; --danger: #EF4444; --warning: #F59E0B;
    --surface: #FFFFFF; --surface2: #F8FAFC; --border: #E2E8F0;
    --text: #0F172A; --text2: #64748B; --text3: #94A3B8;
    --shadow: 0 4px 24px rgba(37,99,235,0.10); --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #EFF6FF; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  #app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--surface); display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .header { background: var(--primary); color: white; padding: 18px 20px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(37,99,235,0.25); }
  .header-row { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; }
  .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-tabs { display: flex; gap: 4px; margin-top: 4px; }
  .nav-tab-btn { flex: 1; background: rgba(255, 255, 255, 0.15); border: none; color: rgba(255, 255, 255, 0.7); padding: 10px; font-size: 14px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif; border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.2s; text-align: center; }
  .nav-tab-btn.active { background: var(--surface); color: var(--primary); }
  .screen { display: none; flex-direction: column; flex: 1; padding: 24px 20px 100px; }
  .screen.active { display: flex; }
  .screen-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
  .screen-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
  .stats-filter-card { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; }
  .stats-date-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  .stats-date-row input { flex: 1; border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 10px; font-size: 14px; outline: none; font-family: inherit; text-align: center; background: white; }
  .btn-stats-search { width: 100%; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .stats-section-title { font-size: 16px; font-weight: 700; color: var(--text); margin: 20px 0 10px; padding-left: 4px; border-left: 4px solid var(--primary); }
  .stats-data-list { display: flex; flex-direction: column; gap: 8px; }
  .stats-data-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 16px; border: 1px solid var(--border); cursor: pointer; }
  .stats-data-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .stats-data-count { font-size: 15px; font-weight: 700; color: var(--primary); }
  .stats-empty-msg { text-align: center; color: var(--text3); font-size: 13px; padding: 30px 0; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-title">기저귀 사용 관리</div>
        <div class="header-sub">요양병원 스마트 기록 시스템</div>
      </div>
    </div>
    <div class="header-tabs">
      <button class="nav-tab-btn active" id="tab-stats">통계 확인</button>
    </div>
  </div>

  <div id="main-stats-area" class="screen active">
    <div class="screen-title">사용 통계 조회</div>
    <div class="screen-sub">지정된 날짜 범위 내의 사용량을 실시간으로 집계합니다.</div>
    <div class="stats-filter-card">
      <div class="stats-date-row">
        <input type="date" id="statsStartDate">
        <span style="color:var(--text2); font-weight:bold;">~</span>
        <input type="date" id="statsEndDate">
      </div>
      <button class="btn-stats-search" onclick="loadStatistics()">조회하기</button>
    </div>
    <div id="stats-result-container" style="display:none;">
      <div class="stats-section-title">병동별 사용 통계</div>
      <div class="stats-data-list" id="stats-dept-list"></div>
      <div class="stats-section-title">환자별 사용 통계</div>
      <div class="stats-data-list" id="stats-patient-list"></div>
      <div class="stats-section-title">기저귀 종류별 통계</div>
      <div class="stats-data-list" id="stats-type-list"></div>
    </div>
    <div id="stats-loading-msg" class="stats-empty-msg" style="display:none; font-weight: 600; color: var(--primary);">데이터 불러오는 중...</div>
    <div id="stats-initial-msg" class="stats-empty-msg">날짜를 설정하고 조회하기 버튼을 눌러주세요.</div>
  </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzuo-UYQr3NmHJuGY2v-w4KcOObRfv2YX9Xs6CY9CQDxqhB2cOW_MxtuFToY8fu_CEN/exec";
let fullRawData = [];

function showDetail(type, value) {
    const filtered = fullRawData.filter(item => {
        if (type === 'dept') return item.dept === value;
        if (type === 'patientName') return `${item.patientName || '미지정'}(${item.patientId || '0'} / ${item.roomNo || '0'}호)` === value;
        if (type === 'diaperType') return `${item.diaperCat || '기타'} - ${item.diaperType || '기타'}` === value;
        return false;
    });

    if (filtered.length === 0) { alert("상세 내역이 없습니다."); return; }

    let msg = `[${value}] 상세 내역\n\n`;
    filtered.forEach((r, i) => {
        msg += `${i+1}. ${r.date?.split('T')[0]} | ${r.dept} | ${r.patientName} | ${r.diaperType} | ${r.qty}개\n`;
    });
    alert(msg);
}

function loadStatistics() {
    const startVal = document.getElementById('statsStartDate').value;
    const endVal = document.getElementById('statsEndDate').value;
    
    if(!startVal || !endVal) { alert("날짜를 모두 선택하세요."); return; }
    
    const start = new Date(startVal);
    const end = new Date(endVal);
    end.setHours(23, 59, 59, 999); // 종료일의 마지막 시간까지 포함

    if(start > end) { alert("종료일이 시작일보다 빠를 수 없습니다."); return; }
    
    document.getElementById('stats-loading-msg').style.display = 'block';
    document.getElementById('stats-initial-msg').style.display = 'none';
    document.getElementById('stats-result-container').style.display = 'none';

    fetch(GOOGLE_SCRIPT_URL)
        .then(res => res.json())
        .then(rows => {
            // [날짜 필터링 로직 적용]
            fullRawData = rows.filter(r => {
                const d = new Date(r.date);
                return d >= start && d <= end;
            });

            document.getElementById('stats-loading-msg').style.display = 'none';
            document.getElementById('stats-result-container').style.display = 'block';
            
            const deptMap = {}, patMap = {}, typeMap = {};
            
            fullRawData.forEach(r => {
                const q = parseInt(r.qty) || 0;
                const pKey = `${r.patientName || '미지정'}(${r.patientId || '0'} / ${r.roomNo || '0'}호)`;
                const tKey = `${r.diaperCat || '기타'} - ${r.diaperType || '기타'}`;
                
                if(r.dept) deptMap[r.dept] = (deptMap[r.dept] || 0) + q;
                patMap[pKey] = (patMap[pKey] || 0) + q;
                typeMap[tKey] = (typeMap[tKey] || 0) + q;
            });
            
            renderList('stats-dept-list', deptMap, 'dept');
            renderList('stats-patient-list', patMap, 'patientName');
            renderList('stats-type-list', typeMap, 'diaperType');
        })
        .catch(err => {
            document.getElementById('stats-loading-msg').style.display = 'none';
            alert("데이터를 불러오는 중 오류가 발생했습니다.");
        });
}

function renderList(id, map, type) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    const keys = Object.keys(map);
    if(keys.length === 0) { el.innerHTML = '<div class="stats-empty-msg">데이터가 없습니다.</div>'; return; }
    
    keys.forEach(key => {
        const div = document.createElement('div');
        div.className = 'stats-data-row';
        div.innerHTML = `<span class="stats-data-name">${key}</span><span class="stats-data-count">${map[key]}개</span>`;
        div.onclick = () => showDetail(type, key);
        el.appendChild(div);
    });
}
</script>
</body>
</html>
