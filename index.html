<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    select, input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; }
  </style>
</head>
<body>
  <h2>기저귀 사용 입력</h2>
  <form id="diaperForm">
    <input type="date" name="date" required>
    <input type="time" name="time" required>
    <select name="dept">
      <option value="2A">2A</option>
      <option value="2B">2B</option>
      <option value="3A">3A</option>
      <option value="3B">3B</option>
      <option value="5병동">5병동</option>
      <option value="재활치료실">재활치료실</option>
      <option value="외래">외래</option>
      <option value="원무과">원무과</option>
    </select>
    <select name="staffType">
      <option value="치료사">치료사</option>
      <option value="병동 인력">병동 인력</option>
      <option value="행정 인력">행정 인력</option>
      <option value="간병사">간병사</option>
    </select>
    <input type="text" name="staffName" placeholder="직원 이름 (한글)" required>
    <input type="text" name="patientName" placeholder="환자 이름" required>
    <input type="number" name="patientId" placeholder="환자 번호 (6자리)" maxlength="6">
    <input type="number" name="room" placeholder="병실 (3자리)" maxlength="3">
    
    <select name="category" id="category" onchange="updateType()">
      <option value="팬티형">팬티형 기저귀</option>
      <option value="겉기저귀">겉기저귀</option>
      <option value="속기저귀">속기저귀</option>
      <option value="위생매트">위생깔개매트</option>
    </select>
    
    <select name="type" id="type"></select>
    <input type="number" name="quantity" placeholder="사용 개수" required>
    
    <button type="button" onclick="submitForm()">제출</button>
  </form>

  <script>
    function updateType() {
      // 선택한 구분에 따라 종류 옵션 변경 로직 (생략된 예시)
      var cat = document.getElementById('category').value;
      var typeSelect = document.getElementById('type');
      typeSelect.innerHTML = '<option value="자가">자가 입력</option>'; // 예시
    }

    function submitForm() {
      var form = document.getElementById('diaperForm');
      google.script.run.withSuccessHandler(function(res) { alert(res); }).processForm(form);
    }
  </script>
</body>
</html>
