<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기저귀 관리 시스템</title>
    <style>
        /* CSS 생략 (제공해주신 스타일 그대로 사용 가능) */
        body { font-family: sans-serif; background: #EFF6FF; margin: 0; padding-bottom: 80px; }
        .screen { display: none; padding: 20px; }
        .screen.active { display: block; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; max-width: 480px; display: flex; padding: 20px; background: white; border-top: 1px solid #ddd; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-next { background: #2563EB; color: white; }
    </style>
</head>
<body>
    <div id="app">
        <div id="screen1" class="screen active"><h3>환자 정보</h3><input type="text" id="patientName" placeholder="이름"></div>
        <div id="screen2" class="screen"><h3>기저귀 구분</h3></div>
        <div class="bottom-bar">
            <button onclick="goBack()">이전</button>
            <button class="btn-next" id="btnNext" onclick="handleNext()">다음</button>
        </div>
    </div>

    <script>
        // ⚠️ 아래 주소를 본인의 정확한 웹 앱 URL로 바꾸세요
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxQ1VHT1qbop8KavwnzhgwoL6Hb14qubYfv6jxrtvqFFMgySmmc354GN2-AjhcEgWv9/exec';
        
        let currentScreen = 1;
        const totalScreens = 7;

        function goBack() {
            if (currentScreen > 1) {
                document.getElementById('screen' + currentScreen).classList.remove('active');
                currentScreen--;
                document.getElementById('screen' + currentScreen).classList.add('active');
            }
        }

        function handleNext() {
            if (currentScreen < totalScreens) {
                document.getElementById('screen' + currentScreen).classList.remove('active');
                currentScreen++;
                document.getElementById('screen' + currentScreen).classList.add('active');
            } else {
                saveData();
            }
        }

        async function saveData() {
            const data = {
                name: document.getElementById('patientName').value,
                // 나머지 데이터 추가
            };
            
            document.getElementById('btnNext').innerText = "저장 중...";
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                alert('저장되었습니다.');
                location.reload();
            } catch (e) {
                alert('저장 실패');
            }
        }
    </script>
</body>
</html>
